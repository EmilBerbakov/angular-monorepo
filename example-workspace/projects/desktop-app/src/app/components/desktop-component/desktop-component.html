@let data = sharedService.users$ | async;
<lib-shared-card-component
  [title]="'Welcome to the Desktop App!'"
  [subtitle]="'This is a shared card component from the example library.'"
>
<table mat-table [dataSource]="data" body>
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef> ID </th>
    <td mat-cell *matCellDef="let element"> {{element.id}} </td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> Name </th>
    <td mat-cell *matCellDef="let element"> {{element.name}} </td>
  </ng-container>

  <ng-container matColumnDef="email">
    <th mat-header-cell *matHeaderCellDef> Email </th>
    <td mat-cell *matCellDef="let element"> {{element.email}} </td>
  </ng-container>

  <ng-container matColumnDef="website">
    <th mat-header-cell *matHeaderCellDef> Website </th>
    <td mat-cell *matCellDef="let element"> {{element.website}} </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="['id', 'name', 'email', 'website']"></tr>
  <tr mat-row *matRowDef="let row; columns: ['id', 'name', 'email', 'website'];"></tr>
</table>
</lib-shared-card-component>
